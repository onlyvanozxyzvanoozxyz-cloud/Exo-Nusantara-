<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EXO NUSANTARA — Jivio Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#060A18; --bg-mid:#0C1330;
    --accent:#3DE0FF; --accent2:#FF3E9A; --gold:#FFD34D;
    --glass:rgba(255,255,255,0.055); --glass-border:rgba(255,255,255,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg-deep);
    font-family:'Rubik',sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;}

  /* Lobby background: plain CSS gradients only — no blur filters, so it stays cheap on entry-level GPUs */
  #ambient{position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(circle at 20% 10%, rgba(61,224,255,0.14), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(255,62,154,0.12), transparent 50%),
      linear-gradient(160deg, var(--bg-deep), var(--bg-mid) 60%, var(--bg-deep));
  }

  /* Flat translucent panels — no backdrop-filter blur (heavy on weak GPUs) */
  .glass{
    background:var(--glass);
    border:1px solid var(--glass-border);
    box-shadow:0 6px 16px rgba(0,0,0,0.28);
  }

  #lobby, #gameOverScreen, #winScreen, #profileModal, #pauseModal{
    position:absolute; inset:0; z-index:300;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; text-align:center; padding:22px 20px;
    animation:fadeIn .3s ease; overflow-y:auto;
  }
  #lobby{justify-content:flex-start; padding-top:34px;}
  #gameOverScreen,#winScreen{display:none; z-index:150; justify-content:center;}
  #profileModal,#pauseModal{display:none; z-index:400; background:rgba(3,6,16,0.9);}
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}

  .logo{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:36px; letter-spacing:1px;
    color:#EAFBFF; text-shadow:0 0 18px rgba(61,224,255,0.55);
    margin:0;
  }
  .tagline{font-size:11px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin:4px 0 14px;}

  .profile-chip{
    display:flex; align-items:center; gap:10px; padding:8px 18px 8px 8px; border-radius:50px;
    margin-bottom:14px; cursor:pointer;
  }
  .avatar{
    width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); overflow:hidden;
    box-shadow:0 0 12px rgba(61,224,255,0.4);
  }
  .avatar-big{width:64px; height:64px; margin:0 auto 14px;}
  .uname{font-weight:700; font-size:13px; font-family:'Space Grotesk',sans-serif; display:flex; align-items:center; gap:6px;}
  .lvl-badge{font-size:9px; padding:2px 7px; border-radius:20px; background:rgba(255,211,77,0.18); color:var(--gold); font-weight:700;}
  .edit-hint{font-size:9px; color:rgba(255,255,255,0.45); letter-spacing:.5px;}

  .stat-row{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; justify-content:center;}
  .stat-chip{padding:8px 15px; border-radius:16px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px;}
  .stat-chip span.val{font-family:'Space Grotesk',sans-serif; color:var(--gold); font-size:13px;}

  .section{width:100%; max-width:360px; margin-bottom:22px;}
  .section-label{font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4);
    font-weight:700; margin-bottom:9px; text-align:left; padding-left:4px;}

  .levels{display:flex; flex-direction:column; gap:9px;}
  .level-card{
    display:flex; align-items:center; gap:13px; padding:12px 15px; border-radius:16px;
    cursor:pointer; text-align:left; transition:transform .15s ease;
  }
  .level-card:active{transform:scale(0.97);}
  .level-icon{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    background:rgba(255,255,255,0.06);}
  .level-info{flex:1;}
  .level-name{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;}
  .level-sub{font-size:10px; color:rgba(255,255,255,0.55); margin-top:2px;}
  .level-best{font-size:10px; color:var(--gold); margin-top:3px; font-weight:600;}
  .play-arrow{font-size:15px; color:var(--accent);}

  .char-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .char-card{
    border-radius:16px; padding:10px 6px 10px; display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer; transition:transform .15s ease; position:relative;
  }
  .char-card:active{transform:scale(0.95);}
  .char-card.equipped{outline:2px solid var(--accent);}
  .char-thumb{width:48px; height:48px; border-radius:14px; background:rgba(255,255,255,0.05);}
  .char-name{font-size:10px; font-weight:700; font-family:'Space Grotesk',sans-serif;}
  .char-tag{font-size:9px; padding:3px 9px; border-radius:20px; font-weight:700; display:flex; align-items:center; gap:3px;}
  .char-tag.owned{background:rgba(61,224,255,0.18); color:var(--accent);}
  .char-tag.price{background:rgba(255,211,77,0.16); color:var(--gold);}
  .char-tag.equipped-tag{background:rgba(255,255,255,0.14); color:#fff;}
  .char-tag.free{background:rgba(124,245,217,0.18); color:#7CF5D9;}

  .quality-row{display:flex; gap:8px; flex-wrap:wrap;}
  .q-btn{
    flex:1; min-width:70px; padding:11px 6px; border-radius:14px; font-size:11px; font-weight:700;
    cursor:pointer; text-align:center; transition:transform .15s ease; color:rgba(255,255,255,0.7);
  }
  .q-btn:active{transform:scale(0.95);}
  .q-btn.active{outline:2px solid var(--accent); color:#fff; background:rgba(61,224,255,0.14);}

  .btn{
    position:relative; margin:6px; padding:15px 44px; font-size:15px; font-weight:800;
    font-family:'Rubik',sans-serif; letter-spacing:.5px;
    color:#04121a; background:linear-gradient(135deg,var(--accent),#7CF5D9);
    border:none; border-radius:50px; cursor:pointer;
    box-shadow:0 10px 26px rgba(61,224,255,0.3);
    transition:transform .15s ease;
  }
  .btn:active{transform:scale(0.95);}
  .btn-ghost{
    background:var(--glass); color:#fff;
    border:1px solid var(--glass-border); box-shadow:none;
    font-size:13px; padding:12px 28px; font-weight:600;
  }
  .btn-ghost:active{transform:scale(0.95);}

  .modal-card{width:100%; max-width:320px; padding:24px 20px; border-radius:22px;}
  .modal-card h3{font-family:'Space Grotesk',sans-serif; margin:0 0 16px; font-size:19px;}
  .avatar-grid{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:14px;}
  .avatar-opt{
    width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.06); border:2px solid transparent; cursor:pointer;
  }
  .avatar-opt.selected{border-color:var(--accent); box-shadow:0 0 10px rgba(61,224,255,0.4);}
  #usernameInput{
    width:100%; padding:13px 16px; border-radius:14px; border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.05); color:#fff; font-size:15px; font-family:'Rubik',sans-serif;
    margin-bottom:14px; outline:none; text-align:center;
  }
  #usernameInput:focus{border-color:var(--accent);}

  #gameContainer{position:relative; display:none; z-index:1; width:400px; height:711px; flex-shrink:0; transform-origin:center center;}
  canvas{display:block; border-radius:22px; box-shadow:0 24px 60px rgba(0,0,0,0.5); background:#000;}

  #ui{position:absolute; top:16px; left:16px; right:16px; z-index:100; display:flex; justify-content:space-between; align-items:flex-start;}
  .ui-left{display:flex; flex-direction:column; gap:6px; pointer-events:none;}
  .ui-pill{padding:8px 16px; border-radius:14px; font-size:13px; font-weight:700; color:#fff; font-family:'Space Grotesk',sans-serif; letter-spacing:.5px; display:flex; align-items:center; gap:6px;}
  .ui-pill .gold{color:var(--gold);} .ui-pill .cyan{color:var(--accent);}
  .ui-right{display:flex; flex-direction:column; align-items:flex-end; gap:6px;}
  #levelBadge{padding:7px 14px; border-radius:12px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.8); pointer-events:none;}
  #pauseBtn{width:38px; height:38px; border-radius:50%; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  #pauseBtn:active{transform:scale(0.9);}

  #joystick{position:absolute; bottom:38px; left:30px; width:100px; height:100px; border-radius:50%; z-index:100;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.22); transition:opacity .2s;}
  #joyKnob{position:absolute; width:42px; height:42px; top:29px; left:29px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, #bfe9ff); box-shadow:0 4px 10px rgba(0,0,0,0.35);}
  #jumpBtn{position:absolute; bottom:44px; right:34px; width:82px; height:82px; z-index:100; border:none; border-radius:50%;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:#04121a;
    background:radial-gradient(circle at 35% 30%, #FF9FCB, var(--accent2));
    box-shadow:0 10px 22px rgba(255,62,154,0.35); transition:opacity .2s;}
  #jumpBtn:active{transform:scale(0.92);}
  .controls-off{opacity:0.25; pointer-events:none;}

  h2.title{font-family:'Space Grotesk',sans-serif; font-size:28px; margin:0 0 10px; line-height:1.25;}
  .title.fail{color:#FF6FA8;}
  .title.win{color:#7CF5D9;}
  .sub{color:rgba(255,255,255,0.65); font-size:14px; margin-bottom:22px; line-height:1.6;}
  .end-buttons{display:flex; flex-direction:column; align-items:center; gap:2px;}

  #toast{
    position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px); z-index:600;
    padding:12px 22px; border-radius:50px; font-size:13px; font-weight:700; color:#fff;
    opacity:0; pointer-events:none; transition:all .3s ease; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translate(-50%,0);}
</style>
</head>
<body>

<div id="ambient"></div>

<div id="lobby">
  <h1 class="logo">EXO NUSANTARA</h1>
  <div class="tagline">Jivio Studio</div>

  <div class="profile-chip glass" id="profileChip">
    <div class="avatar" id="lobbyAvatar"></div>
    <div>
      <div class="uname"><span id="lobbyUsername">Player</span><span class="lvl-badge" id="lobbyLevel">Lv.1</span></div>
      <div class="edit-hint">ketuk untuk edit profil</div>
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-chip glass" id="winStat"></div>
    <div class="stat-chip glass" id="coinStat"></div>
  </div>

  <div class="section">
    <div class="section-label">PILIH MISI</div>
    <div class="levels" id="levelList"></div>
  </div>

  <div class="section">
    <div class="section-label">KOLEKSI KARAKTER</div>
    <div class="char-grid" id="charGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">KUALITAS GRAFIK</div>
    <div class="quality-row glass" style="padding:8px; border-radius:16px;" id="qualityRow"></div>
  </div>
</div>

<div id="profileModal">
  <div class="modal-card glass">
    <h3>Edit Profil</h3>
    <div class="avatar avatar-big" id="avatarPreview"></div>
    <input id="usernameInput" maxlength="14" placeholder="Username kamu">
    <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
    <button class="btn btn-ghost glass" id="uploadPhotoBtn" style="width:100%; margin:0 0 12px;">UPLOAD FOTO GALERI</button>
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="btn" id="saveProfileBtn" style="width:100%; margin:0;">SIMPAN</button>
    <button class="btn btn-ghost glass" id="closeProfileBtn" style="width:100%; margin:10px 0 0;">BATAL</button>
  </div>
</div>

<div id="pauseModal">
  <div class="modal-card glass">
    <h3>Jeda</h3>
    <button class="btn" id="resumeBtn" style="width:100%; margin:0 0 10px;">LANJUTKAN</button>
    <button class="btn btn-ghost glass" id="pauseExitBtn" style="width:100%; margin:0;">KELUAR KE LOBBY</button>
  </div>
</div>

<div id="gameContainer">
  <div id="ui">
    <div class="ui-left">
      <div class="ui-pill glass" id="scorePill"></div>
      <div class="ui-pill glass" id="coinPill"></div>
    </div>
    <div class="ui-right">
      <button id="pauseBtn" class="glass"></button>
      <div id="levelBadge" class="glass">Default</div>
    </div>
  </div>
  <canvas id="game" width="400" height="711"></canvas>
  <div id="joystick"><div id="joyKnob"></div></div>
  <button id="jumpBtn">JUMP</button>
</div>

<div id="gameOverScreen">
  <h2 class="title fail">MISI GAGAL</h2>
  <div class="sub">Skor kamu: <b id="finalScore">0</b></div>
  <div class="end-buttons">
    <button class="btn" id="restartBtn">COBA LAGI</button>
    <button class="btn btn-ghost glass" id="lobbyBtn1">KEMBALI LOBBY</button>
  </div>
</div>

<div id="winScreen">
  <h2 class="title win">MISI SELESAI 🎉</h2>
  <div class="sub">Skor kamu: <b id="winScore">0</b></div>
  <div class="end-buttons">
    <button class="btn" id="nextBtn">LEVEL BERIKUTNYA</button>
    <button class="btn btn-ghost glass" id="lobbyBtn2">KEMBALI LOBBY</button>
  </div>
</div>

<div id="toast" class="glass"></div>

<script>
/* ============================================================= CUSTOM ICONS (no phone emoji) */
const ICONS = {
  rocket:  '<path d="M12 2c3 2 5 6 4 12l-2 2-2-2c-1-6 0-10 0-12z" fill="#EAFBFF"/><circle cx="12" cy="9" r="1.6" fill="#0A1530"/><path d="M8 15l-3 5 5-2z" fill="#EAFBFF"/><path d="M16 15l3 5-5-2z" fill="#EAFBFF"/>',
  train:   '<rect x="4" y="6" width="16" height="11" rx="3" fill="#EAFBFF"/><rect x="7" y="9" width="4" height="4" fill="#0A1530"/><rect x="13" y="9" width="4" height="4" fill="#0A1530"/><circle cx="8" cy="19" r="1.6" fill="#EAFBFF"/><circle cx="16" cy="19" r="1.6" fill="#EAFBFF"/>',
  temple:  '<path d="M12 2 21 9H3z" fill="#EAFBFF"/><rect x="5" y="10" width="14" height="9" fill="#EAFBFF"/><rect x="7" y="10" width="2" height="9" fill="#0A1530"/><rect x="11" y="10" width="2" height="9" fill="#0A1530"/><rect x="15" y="10" width="2" height="9" fill="#0A1530"/>',
  trophy:  '<path d="M7 4h10v4a5 5 0 01-10 0V4z" fill="#EAFBFF"/><rect x="10" y="13" width="4" height="4" fill="#EAFBFF"/><rect x="8" y="18" width="8" height="2" fill="#EAFBFF"/>',
  diamond: '<path d="M4 8l4-5h8l4 5-8 12z" fill="#EAFBFF"/>',
  pause:   '<rect x="6" y="4" width="4" height="16" rx="1" fill="#EAFBFF"/><rect x="14" y="4" width="4" height="16" rx="1" fill="#EAFBFF"/>'
};
function iconSvg(name, size){ return '<svg viewBox="0 0 24 24" width="' + size + '" height="' + size + '">' + (ICONS[name]||'') + '</svg>'; }

/* ============================================================= AVATAR ICONS (custom, no emoji) */
const AVATAR_ICONS = [
  { id:'bolt',  svg:'<path d="M13 2 4 14h6l-1 8 9-12h-6z" fill="#EAFBFF"/>' },
  { id:'orbit', svg:'<circle cx="12" cy="12" r="4" fill="#EAFBFF"/><ellipse cx="12" cy="12" rx="10" ry="4" fill="none" stroke="#EAFBFF" stroke-width="1.6" transform="rotate(-20 12 12)"/>' },
  { id:'comet', svg:'<circle cx="16" cy="8" r="3.4" fill="#EAFBFF"/><path d="M14 10 4 20l7-3-2 6" stroke="#EAFBFF" stroke-width="2" fill="none" stroke-linecap="round"/>' },
  { id:'prism', svg:'<path d="M12 3 21 19H3z" fill="#EAFBFF"/>' },
  { id:'wave',  svg:'<path d="M2 13c2-7 4 7 6 0s4-7 6 0 4 7 6 0" stroke="#EAFBFF" stroke-width="2.2" fill="none" stroke-linecap="round"/>' },
  { id:'flame', svg:'<path d="M12 2c2 4-3 6-3 9a3.5 3.5 0 107 0c0-1.3-.6-2-.6-2 1.6 1.8 2.6 4 2.6 6a6 6 0 11-12 0c0-5 4-7 6-13z" fill="#EAFBFF"/>' },
  { id:'moon',  svg:'<path d="M20 12.5A8.5 8.5 0 1111.5 4a6.8 6.8 0 108.5 8.5z" fill="#EAFBFF"/>' },
  { id:'spark', svg:'<path d="M12 2l1.8 7.2L21 11l-7.2 1.8L12 20l-1.8-7.2L3 11l7.2-1.8z" fill="#EAFBFF"/>' }
];
function avatarSvg(id, size){
  const def = AVATAR_ICONS.find(a => a.id === id) || AVATAR_ICONS[0];
  return '<svg viewBox="0 0 24 24" width="' + size + '" height="' + size + '">' + def.svg + '</svg>';
}
function renderAvatarInto(el, size){
  if(profile.avatarType === 'photo' && profile.photo){
    el.innerHTML = '<img src="' + profile.photo + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
  } else {
    el.innerHTML = avatarSvg(profile.avatar, size);
  }
}

/* ============================================================= CHARACTER DRAW FUNCTIONS (unique silhouettes) */
function legPair(ctx, legSwing, color){
  ctx.fillStyle = color;
  ctx.save(); ctx.translate(-7,20); ctx.rotate(legSwing*0.05); ctx.fillRect(-5,0,10,11); ctx.restore();
  ctx.save(); ctx.translate(7,20); ctx.rotate(-legSwing*0.05); ctx.fillRect(-5,0,10,11); ctx.restore();
}
function drawThruster(ctx, color, glow){
  if(glow){ ctx.shadowBlur = 20; ctx.shadowColor = color; }
  ctx.fillStyle = color; ctx.globalAlpha = 0.65;
  ctx.beginPath(); ctx.ellipse(-1, 32, 6+Math.random()*2, 10+Math.random()*4, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

function drawExo(ctx,o){
  const glow = o.glow;
  if(o.jumping && o.velY < 2) drawThruster(ctx,'#3DE0FF',glow);
  legPair(ctx, o.legSwing, '#12193A');
  if(glow){ ctx.shadowBlur = 18; ctx.shadowColor = '#3DE0FF'; }
  ctx.fillStyle = '#1B2A55';
  ctx.beginPath(); ctx.roundRect(-16,-10,32,32,10); ctx.fill();
  if(glow) ctx.shadowBlur = 12;
  ctx.fillStyle = '#3DE0FF';
  ctx.beginPath(); ctx.roundRect(-6,-2,12,8,3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#E8EEF7';
  ctx.beginPath(); ctx.roundRect(-15,-32,30,24,12); ctx.fill();
  ctx.fillStyle = '#0A1530';
  ctx.beginPath(); ctx.roundRect(-11,-27,22,14,7); ctx.fill();
  if(glow){ ctx.shadowBlur = 10; ctx.shadowColor = '#3DE0FF'; }
  ctx.fillStyle = '#3DE0FF';
  ctx.beginPath(); ctx.ellipse(2,-20,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}
function drawPixel(ctx,o){
  const glow = o.glow;
  const hopA = o.moving ? Math.abs(Math.sin(o.legSwing))*3 : 0;
  const hopB = o.moving ? Math.abs(Math.sin(o.legSwing+Math.PI))*3 : 0;
  if(o.jumping && o.velY < 2) drawThruster(ctx,'#4DFF9A',glow);
  ctx.fillStyle = '#08210F';
  ctx.fillRect(-13,20-hopA,10,11);
  ctx.fillRect(3,20-hopB,10,11);
  if(glow){ ctx.shadowBlur = 16; ctx.shadowColor = '#4DFF9A'; }
  ctx.fillStyle = '#123B22';
  ctx.fillRect(-17,-9,34,30);
  if(glow) ctx.shadowBlur = 10;
  ctx.fillStyle = '#4DFF9A';
  ctx.fillRect(-6,0,12,10);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#E7FBEF';
  ctx.fillRect(-15,-30,30,22);
  ctx.fillStyle = '#08210F';
  ctx.fillRect(-9,-22,6,6);
  ctx.fillRect(3,-22,6,6);
  ctx.fillStyle = '#4DFF9A';
  ctx.fillRect(-2,-38,4,10);
  if(glow){ ctx.shadowBlur = 8; ctx.shadowColor = '#4DFF9A'; }
  ctx.fillRect(-3,-42,6,6);
  ctx.shadowBlur = 0;
}
function drawGhost(ctx,o){
  const glow = o.glow;
  if(glow){ ctx.shadowBlur = 16; ctx.shadowColor = '#B9C6E0'; }
  ctx.globalAlpha = 0.88;
  ctx.fillStyle = '#2A2E3D';
  ctx.beginPath();
  ctx.moveTo(-15,10);
  ctx.arc(0,-6,15,Math.PI,0);
  const wv = Math.sin(o.frame/10)*3;
  ctx.lineTo(15,10);
  ctx.quadraticCurveTo(11,18+wv,7,10);
  ctx.quadraticCurveTo(3,18-wv,-1,10);
  ctx.quadraticCurveTo(-5,18+wv,-9,10);
  ctx.quadraticCurveTo(-13,18-wv,-15,10);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#E8EEF7';

/* ============================================================= AUDIO */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; } }
  else if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}
function playTone(freq, dur, type, vol){
  if(!audioCtx) return;
  type = type || 'sine'; vol = vol === undefined ? 0.18 : vol;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playTrainWhoosh(){
  if(!audioCtx) return;
  const duration = 1.3;
  const bufferSize = Math.floor(audioCtx.sampleRate * duration);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(180, audioCtx.currentTime);
  filter.frequency.linearRampToValueAtTime(950, audioCtx.currentTime + duration*0.45);
  filter.frequency.linearRampToValueAtTime(140, audioCtx.currentTime + duration);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.32, audioCtx.currentTime + 0.25);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(); noise.stop(audioCtx.currentTime + duration);
}

function handleCharClick(i){
  const c = CHARACTERS[i];
  if(stats.selectedCharacter === i) return;
  if(stats.ownedCharacters.includes(i)){
    stats.selectedCharacter = i;
    saveStats(); renderLobby();
    showToast(c.name + ' dipakai!');
  } else if(stats.totalCoins >= c.price){
    stats.totalCoins -= c.price;
    stats.ownedCharacters.push(i);
    stats.selectedCharacter = i;
    saveStats(); renderLobby();
    showToast(c.name + ' dibeli & dipakai!');
  } else {
    showToast('Kristal tidak cukup');
  }
}

/* ============================================================= CONTROLS */
function setupJoystick() {
  const joy = document.getElementById('joystick');
  const knob = document.getElementById('joyKnob');
  let active = false, touchId = null;

  joy.addEventListener('touchstart', e => {
    if(paused) return;
    e.preventDefault();
    if(e.touches.length > 0){ active = true; touchId = e.touches[0].identifier; updateJoy(e.touches[0]); }
  }, {passive:false});
  window.addEventListener('touchmove', e => {
    if(!active || paused) return;
    for(let t of e.changedTouches) if(t.identifier === touchId){ e.preventDefault(); updateJoy(t); }
  }, {passive:false});
  window.addEventListener('touchend', e => {
    for(let t of e.changedTouches){
      if(t.identifier === touchId){ active = false; moveX = 0; knob.style.transform = 'translate(0px,0px)'; }
    }
  });
}
function updateJoy(touch) {
  const rect = document.getElementById('joystick').getBoundingClientRect();
  let dx = touch.clientX - rect.left - 50;
  let dy = touch.clientY - rect.top - 50;
  const dist = Math.hypot(dx, dy);
  const max = 46;
  if(dist > max){ dx = (dx/dist)*max; dy = (dy/dist)*max; }
  document.getElementById('joyKnob').style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
  moveX = dx / max;
}
function setupJump() {
  const btn = document.getElementById('jumpBtn');
  const jump = () => { if(gameStarted && !paused && !dying && !hero.jumping && !gameOverFlag && !gameWonFlag){ hero.velY = jumpPower; playTone(520,0.09,'square',0.08); } };

}

  hero.velY = type === 'train' ? -14 : -10;
  hero.deathSpin = 0;
  const colors = { train:'#3DE0FF', enemy:'#FF3E9A', predator:'#FF2E2E', spike:'#FF8A3D' };
  spawnBurst(hero.x - cameraX + 17, hero.y + 20, colors[type] || '#FF3E9A', type === 'train' ? 22 : 16);
  shake = type === 'train' ? 20 : 12;
  playTone(type === 'train' ? 160 : 200, type === 'train' ? 0.35 : 0.25, 'sawtooth', 0.2);
  setControlsEnabled(false);
}

function endGame(won){
  if(gameOverFlag || gameWonFlag) return;
  gameStarted = false;
  setControlsEnabled(false);
  if(score > (stats.bestScores[currentLevel] || 0)) stats.bestScores[currentLevel] = score;
  if(score > stats.highScore) stats.highScore = score;

  if(won){
    gameWonFlag = true;
    stats.winCount++;
    playTone(523,0.12,'sine',0.2); setTimeout(()=>playTone(659,0.12,'sine',0.2),120); setTimeout(()=>playTone(784,0.22,'sine',0.22),240);
    document.getElementById('winScore').textContent = score;
    document.getElementById('nextBtn').style.display = (currentLevel + 1 < LEVELS.length) ? 'inline-block' : 'none';
    document.getElementById('winScreen').style.display = 'flex';
  } else {
    gameOverFlag = true;
    if(!shake) shake = 10;
    playTone(140,0.4,'sawtooth',0.2);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOverScreen').style.display = 'flex';
  }
  saveStats();
}

/* pause */
document.getElementById('pauseBtn').addEventListener('click', () => {
  if(!gameStarted || gameOverFlag || gameWonFlag || dying) return;
  paused = true;
  document.getElementById('pauseModal').style.display = 'flex';
});
document.getElementById('resumeBtn').addEventListener('click', () => {
  paused = false;
  document.getElementById('pauseModal').style.display = 'none';
});
document.getElementById('pauseExitBtn').addEventListener('click', () => {
  saveStats();
  paused = false;
  gameStarted = false;
  goToLobby();
});

function update() {
  if(!gameStarted || paused) return;
  frame++;

  if(dying){
    deathTimer++;
    hero.velY += 0.6;
    hero.y += hero.velY;
    hero.deathSpin += 0.32;
    if(shake > 0){ shake *= 0.9; if(shake < 0.2) shake = 0; }
    if(deathTimer > 42){ dying = false; endGame(false); }
    return;
  }

  const theme = LEVELS[currentLevel].theme;

  /* museum flash-flood + whale event */
  if(theme === 'museum'){
    waterState.timer++;
    if(!waterState.active && waterState.timer >= WATER_INTERVAL){
      waterState.active = true; waterState.timer = 0;
      whale = { x: hero.x - 240, y: 600 };
      playTone(170,0.3,'sine',0.15);
    }
    if(waterState.active){
      const t = waterState.timer;
      if(t < WATER_RISE) waterState.level = (t/WATER_RISE)*WATER_MAX;
      else if(t < WATER_RISE+WATER_HOLD) waterState.level = WATER_MAX;
      else if(t < WATER_RISE+WATER_HOLD+WATER_FALL){
        const ft = (t-(WATER_RISE+WATER_HOLD))/WATER_FALL;
        waterState.level = WATER_MAX*(1-ft);
      } else {
        waterState.active = false; waterState.timer = 0; waterState.level = 0; whale = null;
      }
      if(whale){
        const dir = hero.x > whale.x ? 1 : -1;
        whale.x += dir*10;
        whale.y = 620 - waterState.level + 8;
        if(rectCollide(hero, {x:whale.x-22,y:whale.y-14,w:46,h:30})){ triggerDeath('predator'); return; }
      }
    }
  }

  if(Math.abs(moveX) > 0.12) {
    const inWater = theme === 'museum' && waterState.active && (hero.y + hero.height > 620 - waterState.level);
    hero.x += hero.speed * (inWater ? 0.5 : 1) * moveX;
    hero.facingRight = moveX > 0;
    hero.legAngle += (inWater ? 0.2 : 0.35);
  }

  hero.velY += gravity;
  hero.y += hero.velY;
  hero.jumping = true;

  for(let p of platforms){
    if(rectCollide(hero, {x:p.x, y:p.y, w:p.w, h:p.h})){
      if(hero.velY > 0 && hero.y + hero.height - 18 < p.y){
        const landedHard = hero.velY > 14;
        hero.y = p.y - hero.height;
        hero.velY = 0;
        if(hero.jumping){ hero.squash = 1.35; if(landedHard) spawnDust(hero.x - cameraX + 18, hero.y + 44); }
        hero.jumping = false;
      }
    }
  }
  hero.squash += (1 - hero.squash) * 0.2;

  if(hero.y > 780){ endGame(false); return; }

  cameraX += (hero.x - 170 - cameraX) * 0.1;

  for(let e of enemies){
    if(!e.alive) continue;
    e.x += e.speed;
    if(e.x < 300 || e.x > LEVEL_END_X - 150) e.speed *= -1;
    if(rectCollide(hero, {x:e.x,y:e.y,w:36,h:34})){
      if(hero.velY > 3 && hero.y + 25 < e.y){
        e.alive = false; score += 200; hero.velY = -16;
        spawnBurst(e.x+18-cameraX, e.y+16, '#FF3E9A', 14);
        playTone(300,0.1,'square',0.14);
      } else {
        triggerDeath('enemy'); return;
      }
    }
  }

  for(let p of predators){
    p.y += p.speed * p.dir;
    if(p.y < p.minY || p.y > p.maxY) p.dir *= -1;
    if(rectCollide(hero, {x:p.x-16, y:p.y-16, w:34, h:34})){ triggerDeath('predator'); return; }
  }

  for(let s of spikes){
    if(rectCollide(hero, s)){ triggerDeath('spike'); return; }
  }

  for(let c of coins){
    if(!c.collected && Math.hypot(hero.x+17 - c.x, hero.y+22 - c.y) < 36){
      c.collected = true; coinsCollected++; score += 60; stats.totalCoins++;
      spawnBurst(c.x - cameraX, c.y, '#FFD34D', 10);
      playTone(880,0.1,'sine',0.13);
      scheduleStatsSave();
    }
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--; });
  particles = particles.filter(p => p.life > 0);

  if(shake > 0){ shake *= 0.85; if(shake < 0.2) shake = 0; }

  if(theme === 'train'){
    if(trainState.active){
      if(trainState.mode === 'pass'){
        trainState.x += trainState.speed;
        const heroScreenX = hero.x - cameraX;
        for(let i=0;i<8;i++){
          const cx = trainState.x + i*(TRAIN_CAR_W+TRAIN_GAP);
          if(cx < -TRAIN_CAR_W || cx > 420) continue;
          if(heroScreenX + hero.width > cx && heroScreenX < cx + TRAIN_CAR_W &&
             hero.y + hero.height > TRAIN_Y + 8 && hero.y < TRAIN_Y + TRAIN_CAR_H){
            triggerDeath('train'); return;
          }
        }
        if(trainState.x > 1200){ trainState.active = false; trainState.mode = null; trainState.cooldown = 190 + Math.random()*220; }
      } else if(trainState.mode === 'station'){
        trainState.timer++;
        const arriveEnd = 50, holdEnd = 190, departEnd = 250;
        if(trainState.timer <= arriveEnd){
          const tt = trainState.timer/arriveEnd;
          trainState.x = -900 + (30-(-900)) * (1-(1-tt)*(1-tt));
        } else if(trainState.timer <= holdEnd){
          trainState.x = 30;
        } else if(trainState.timer <= departEnd){
          const tt = (trainState.timer-holdEnd)/(departEnd-holdEnd);
          trainState.x = 30 + (1300-30) * (tt*tt);
        } else {
          trainState.active = false; trainState.mode = null; trainState.cooldown = 190 + Math.random()*220;
        }
        /* no collision check while stopped at the station — safe to pass by */
      }
    } else if(trainState.building){
      trainState.buildTimer++;
      if(trainState.buildTimer > 20){
        trainState.building = false; trainState.active = true; trainState.x = -900; trainState.timer = 0;
        trainState.type = Math.floor(Math.random()*3);
        trainState.mode = Math.random() < 0.4 ? 'station' : 'pass';
        trainState.speed = trainState.mode === 'pass' ? (20 + Math.random()*9) : 16;
        playTrainWhoosh();
      }
    } else {
      trainState.cooldown--;
      if(trainState.cooldown <= 0){ trainState.building = true; trainState.buildTimer = 0; }
    }
  }

  if(hero.x > LEVEL_END_X){ endGame(true); return; }

  document.getElementById('scorePill').innerHTML = 'SCORE <span class="cyan">' + score + '</span>';
  document.getElementById('coinPill').innerHTML = iconSvg('diamond',12) + ' <span class="gold">' + coinsCollected + '</span>';
}

/* ============================================================= BACKGROUND / DECOR */
function getSkyGradient(theme){
  const key = theme + '_' + qualityKey;
  if(bgCache[key]) return bgCache[key];
  let grad;
  if(theme === 'train'){
    grad = ctx.createLinearGradient(0,0,0,711);
    grad.addColorStop(0,'#171B2B'); grad.addColorStop(0.6,'#20263D'); grad.addColorStop(1,'#0F1220');
  } else if(theme === 'museum'){
    grad = ctx.createLinearGradient(0,0,0,711);
    grad.addColorStop(0,'#3A2E23'); grad.addColorStop(0.55,'#241C15'); grad.addColorStop(1,'#171310');
  } else {
    grad = ctx.createLinearGradient(0,0,0,711);
    grad.addColorStop(0,'#04060F'); grad.addColorStop(0.5,'#0A1030'); grad.addColorStop(1,'#141E4A');
  }
  bgCache[key] = grad;
  return grad;
}

function drawRailBase(){
  ctx.strokeStyle = 'rgba(190,190,200,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, TRAIN_Y+TRAIN_CAR_H+8); ctx.lineTo(400, TRAIN_Y+TRAIN_CAR_H+8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, TRAIN_Y+TRAIN_CAR_H+14); ctx.lineTo(400, TRAIN_Y+TRAIN_CAR_H+14); ctx.stroke();
  ctx.fillStyle = 'rgba(130,110,90,0.4)';
  for(let i=0;i<19;i++){
    const tx = (i*22 - cameraX*1.4) % 440;
    ctx.fillRect(tx<0?tx+440:tx, TRAIN_Y+TRAIN_CAR_H+7, 4, 10);
  }
}
function drawRailBuildSweep(q){
  const progress = Math.min(trainState.buildTimer/20, 1);
  const sweepX = 400*progress;
  if(q.glow){ ctx.shadowBlur = 12; ctx.shadowColor = '#FFD34D'; }
  ctx.strokeStyle = '#FFD34D'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, TRAIN_Y+TRAIN_CAR_H+8); ctx.lineTo(sweepX, TRAIN_Y+TRAIN_CAR_H+8); ctx.stroke();
  ctx.shadowBlur = 0;
  for(let s=0;s<3;s++){
    ctx.fillStyle = 'rgba(255,211,77,' + (0.6-s*0.18) + ')';
    ctx.beginPath(); ctx.arc(sweepX-s*7, TRAIN_Y+TRAIN_CAR_H+8+(Math.random()-0.5)*6, 3, 0, Math.PI*2); ctx.fill();
  }
}
function drawCarsRow(startX, cs, full){
  for(let i=0;i<8;i++){
    const cx = startX + i*(TRAIN_CAR_W+TRAIN_GAP);
    if(cx < -TRAIN_CAR_W-30 || cx > 420) continue;
    const bob = full ? Math.sin(frame/6+i)*1.2 : 0;
    if(i > 0 && full){ ctx.fillStyle = '#2A2A2A'; ctx.fillRect(cx-TRAIN_GAP, TRAIN_Y+TRAIN_CAR_H/2-3+bob, TRAIN_GAP, 6); }
    ctx.fillStyle = cs.body;
    ctx.beginPath();
    if(i === 7){
      ctx.moveTo(cx, TRAIN_Y+bob);
      ctx.lineTo(cx+TRAIN_CAR_W-8, TRAIN_Y+bob);
      ctx.quadraticCurveTo(cx+TRAIN_CAR_W+20, TRAIN_Y+TRAIN_CAR_H/2+bob, cx+TRAIN_CAR_W-8, TRAIN_Y+TRAIN_CAR_H+bob);
      ctx.lineTo(cx, TRAIN_Y+TRAIN_CAR_H+bob);
      ctx.closePath();
    } else if(i === 0){
      ctx.moveTo(cx+8, TRAIN_Y+bob);
      ctx.lineTo(cx+TRAIN_CAR_W, TRAIN_Y+bob);
      ctx.lineTo(cx+TRAIN_CAR_W, TRAIN_Y+TRAIN_CAR_H+bob);
      ctx.lineTo(cx+8, TRAIN_Y+TRAIN_CAR_H+bob);
      ctx.quadraticCurveTo(cx-12, TRAIN_Y+TRAIN_CAR_H/2+bob, cx+8, TRAIN_Y+bob);
      ctx.closePath();
    } else {
      ctx.roundRect(cx, TRAIN_Y+bob, TRAIN_CAR_W, TRAIN_CAR_H, 6);
    }
    ctx.fill();
    if(full){
      ctx.fillStyle = cs.stripe;
      ctx.fillRect(cx, TRAIN_Y+TRAIN_CAR_H-10+bob, TRAIN_CAR_W, 4);
      ctx.fillStyle = cs.accent;
      for(let w=0; w<4; w++) ctx.fillRect(cx+8+w*17, TRAIN_Y+10+bob, 12, 15);
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(cx+14, TRAIN_Y+TRAIN_CAR_H+2+bob, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+TRAIN_CAR_W-14, TRAIN_Y+TRAIN_CAR_H+2+bob, 5, 0, Math.PI*2); ctx.fill();
    }
  }
}
function drawTrainCars(q){
  const colorSets = [
    { body:'#F4F6FA', accent:'#1B3D8F', stripe:'#0B1E4A' },
    { body:'#EDEDED', accent:'#2E8B57', stripe:'#155C36' },
    { body:'#2A1B3D', accent:'#FF3E9A', stripe:'#12081F' }
  ];
  const cs = colorSets[trainState.type];
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
  for(let i=0;i<8;i++){
    const lx = trainState.x - 24 - i*16;
    if(lx < -24 || lx > 420) continue;
    ctx.beginPath(); ctx.moveTo(lx, TRAIN_Y+8+i*6); ctx.lineTo(lx-30, TRAIN_Y+8+i*6); ctx.stroke();
  }
  if(q.extras && trainState.mode === 'pass'){
    ctx.globalAlpha = 0.10; drawCarsRow(trainState.x-26, cs, 0); ctx.globalAlpha = 1;
    ctx.globalAlpha = 0.06; drawCarsRow(trainState.x-50, cs, 0); ctx.globalAlpha = 1;
  }
  drawCarsRow(trainState.x, cs, 1);
}
function drawStation(){
  ctx.fillStyle = '#3A4B6B';
  ctx.fillRect(0, TRAIN_Y-6, 66, TRAIN_CAR_H+16);
  ctx.fillStyle = '#232E47';
  ctx.fillRect(0, TRAIN_Y+TRAIN_CAR_H+8, 66, 8);
  ctx.fillStyle = 'rgba(255,211,77,0.25)';
  ctx.fillRect(0, TRAIN_Y-22, 66, 8);
  if(trainState.timer >= 60 && trainState.timer <= 180){
    const t = Math.min(1, (trainState.timer-60)/90);
    for(let i=0;i<3;i++){
      const localT = Math.max(0, Math.min(1, t*1.4 - i*0.22));
      const startX = 8 + i*12, endX = 34;
      const mx = startX + (endX-startX)*localT;
      ctx.fillStyle = '#1A1A1A';
      ctx.beginPath(); ctx.arc(mx, TRAIN_Y+TRAIN_CAR_H-2, 3.6, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(mx-2, TRAIN_Y+TRAIN_CAR_H+1, 4, 9);
    }
  }
}

function drawWhale(w){
  const wx = w.x - cameraX;
  if(wx < -70 || wx > 470) return;
  ctx.fillStyle = '#2E5C7A';
  ctx.beginPath(); ctx.ellipse(wx, w.y, 30, 15, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(wx-28,w.y); ctx.lineTo(wx-44,w.y-11); ctx.lineTo(wx-44,w.y+11); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#E8F4FA';
  ctx.beginPath(); ctx.ellipse(wx+8,w.y+7,14,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#12222E';
  ctx.beginPath(); ctx.arc(wx+20,w.y-4,2.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.ellipse(wx+30,w.y-16,4,10,0,0,Math.PI*2); ctx.fill();
}

function drawBackground(theme, q) {
  ctx.fillStyle = getSkyGradient(theme);
  ctx.fillRect(0,0,400,711);

  if(theme === 'train'){
    for(let i=0;i<Math.min(10, Math.round(q.stars/6));i++){
      const lx = (i*300 - cameraX*0.4) % 3000;
      const flick = 0.5 + Math.abs(Math.sin(frame/14 + i))*0.5;
      ctx.globalAlpha = flick;
      if(q.glow){ ctx.shadowBlur = 20; ctx.shadowColor = '#FFD34D'; }
      ctx.fillStyle = '#FFD34D';
      ctx.beginPath(); ctx.arc(lx<0?lx+3000:lx, 60, 6, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
    ctx.fillStyle = 'rgba(120,180,255,0.10)';
    for(let i=0;i<14;i++){
      const wx = (i*160 - cameraX*1.4) % 2240;
      ctx.fillRect(wx<0?wx+2240:wx, 150, 60, 140);
    }
    drawRailBase();
    if(trainState.building) drawRailBuildSweep(q);
    if(trainState.active) drawTrainCars(q);
    if(trainState.active && trainState.mode === 'station') drawStation();
  } else if(theme === 'museum'){

    orbGrad.addColorStop(0,'rgba(255,217,138,0.45)'); orbGrad.addColorStop(1,'rgba(255,217,138,0)');
    ctx.fillStyle = orbGrad; ctx.beginPath(); ctx.arc(200,90,120,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    const bx = (2700 - cameraX*0.12) % 5400;
    const bfx = bx<0?bx+5400:bx;
    ctx.fillStyle = 'rgba(42,26,14,0.55)';
    const steps = [150,120,92,66,42];
    let sy = 290;
    steps.forEach(w => { ctx.fillRect(bfx-w/2, sy, w, 24); sy += 20; });
    ctx.beginPath(); ctx.arc(bfx, 288, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(bfx-1, 272, 2, 16);

    const frames = [['#7A2E2E','#D8A24A'],['#2E4F7A','#D8A24A'],['#3F6B3F','#D8A24A']];
    for(let i=0;i<12;i++){
      const px = (i*380 - cameraX*0.4) % 4560;
      const fx = px<0?px+4560:px;
      const col = frames[i%3];
      ctx.fillStyle = col[1]; ctx.fillRect(fx, 40, 90, 120);
      ctx.fillStyle = col[0]; ctx.fillRect(fx+8, 48, 74, 104);
      if(q.extras){
        ctx.strokeStyle = 'rgba(216,162,74,0.5)'; ctx.lineWidth = 2;

          ctx.beginPath(); ctx.moveTo(fx+8+l*14, 48); ctx.lineTo(fx+34+l*14, 152); ctx.stroke();
        }
      }
    }

    for(let i=0;i<5;i++){
      const sx = (i*820 - cameraX*0.5) % 4920;
      const fx = sx<0?sx+4920:sx;
      const sway = q.extras ? Math.sin(frame/50+i)*1.2 : 0;
      ctx.fillStyle = '#D8C9A8';
      ctx.beginPath(); ctx.ellipse(fx, 590, 24, 11, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1A120B';
      ctx.beginPath();
      ctx.moveTo(fx, 540+sway); ctx.lineTo(fx-9, 560+sway); ctx.lineTo(fx-4, 588+sway);
      ctx.lineTo(fx+7, 588+sway); ctx.lineTo(fx+11, 558+sway); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(fx-6, 540+sway); ctx.lineTo(fx, 520+sway); ctx.lineTo(fx+6, 540+sway); ctx.closePath(); ctx.fill();
      if(q.extras){

    const orbGrad = ctx.createRadialGradient(3000-cameraX*0.1,120,4, 3000-cameraX*0.1,120,60);

    ctx.fillStyle = orbGrad;

      ctx.fillStyle = neb2; ctx.beginPath(); ctx.arc(nfx2,340,160,0,Math.PI*2); ctx.fill();

      const rocketColors = [ ['#E8EEF7','#FF3E9A'], ['#FFE9C2','#3DE0FF'], ['#E0D8FF','#FFD34D'] ];
      for(let i=0;i<4;i++){
        const rx = (i*1200 - cameraX*0.35) % 4800;
        const fx = rx<0?rx+4800:rx;
        const rc = rocketColors[i%3];
        ctx.save(); ctx.translate(fx, 180+i*40); ctx.rotate(-0.4);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        for(let t=0;t<3;t++) ctx.fillRect(-2, 12+t*7, 4, 4);
        ctx.fillStyle = rc[0]; ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(9,10); ctx.lineTo(-9,10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = rc[1]; ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(6,22); ctx.lineTo(-6,22); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      const px = (2400 - cameraX*0.2) % 4800;
      const fpx = px<0?px+4800:px;
      ctx.strokeStyle='rgba(255,211,77,0.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(fpx, 200, 26, 8, 0.5, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#FFD34D';
      ctx.beginPath(); ctx.arc(fpx, 200, 14, 0, Math.PI*2); ctx.fill();

      const px2 = (3900 - cameraX*0.28) % 4800;
      const fpx2 = px2<0?px2+4800:px2;
      ctx.fillStyle = '#8C7BFF';
      ctx.beginPath(); ctx.arc(fpx2, 340, 10, 0, Math.PI*2); ctx.fill();

      const cyclePos = frame % 240;
      if(cyclePos < 16){
        const t = cyclePos/16;
        const ssx = 400*(1-t) + 40, ssy = 70 + 90*t;
        ctx.strokeStyle = 'rgba(255,255,255,' + (1-t) + ')'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(ssx,ssy); ctx.lineTo(ssx+28,ssy-13); ctx.stroke();
      }
    }
  }
  ctx.fillStyle = 'rgba(61,224,255,0.08)';
  for(let i=0;i<9;i++){
    const cx = (200 + i*450 - cameraX*0.3) % 4800;
    ctx.beginPath(); ctx.ellipse(cx<0?cx+4800:cx, 560, 220, 90, 0, 0, Math.PI*2); ctx.fill();
  }
}

function drawCastle(){
  const baseX = LEVEL_END_X + 70 - cameraX;
  if(baseX < -120 || baseX > 520) return;
  const towers = [-58,-20,20,58];
  ctx.fillStyle = 'rgba(18,14,32,0.9)';
  towers.forEach((dx,i) => {
    const tw = i%2===0 ? 32 : 24;
    const th = i%2===0 ? 150 : 112;
    ctx.fillRect(baseX+dx-tw/2, 620-th, tw, th);
    ctx.beginPath();
    ctx.moveTo(baseX+dx-tw/2-4, 620-th);
    ctx.lineTo(baseX+dx, 620-th-28);
    ctx.lineTo(baseX+dx+tw/2+4, 620-th);
    ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle = 'rgba(255,211,77,0.85)';
  towers.forEach(dx => {
    for(let w=0; w<3; w++) ctx.fillRect(baseX+dx-4, 620-40-w*36, 8, 10);
  });
}

function drawFinishLine(){
  const fx = LEVEL_END_X - cameraX;
  if(fx < -40 || fx > 440) return;
  ctx.fillStyle = '#ddd';
  ctx.fillRect(fx, 380, 6, 240);
  ctx.fillStyle = '#FFD34D';
  ctx.beginPath(); ctx.moveTo(fx+6,382); ctx.lineTo(fx+44,394); ctx.lineTo(fx+6,406); ctx.closePath(); ctx.fill();
  for(let i=0;i<8;i++){
    ctx.fillStyle = i%2===0 ? '#f4f4f4' : '#1a1a1a';
    ctx.fillRect(fx-4+i*8, 604, 8, 16);
  }
}

function platformColors(theme){
  if(theme === 'train') return {top:'#3A4B6B', bottom:'#232E47', edge:'rgba(255,211,77,0.4)'};
  if(theme === 'museum') return {top:'#D8C9A8', bottom:'#A98F63', edge:'rgba(216,162,74,0.7)'};
  return {top:'#233B7A', bottom:'#152755', edge:'rgba(61,224,255,0.35)'};
}
function getPlatformGradient(theme, h){
  const key = theme + '_' + h;
  if(platformGradCache[key]) return platformGradCache[key];
  const pc = platformColors(theme);
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,pc.top); g.addColorStop(1,pc.bottom);
  platformGradCache[key] = g;
  return g;
}

function drawEnemy(e, theme, q){
  const ex = e.x - cameraX;
  const bob = Math.sin(frame/8 + e.x)*3;
  if(theme === 'train'){
    ctx.fillStyle = '#5B6478';
    ctx.beginPath(); ctx.roundRect(ex+2, e.y+2+bob, 34, 30, 8); ctx.fill();
    ctx.fillStyle = '#FF4D4D';
    if(q.glow){ ctx.shadowBlur = 10; ctx.shadowColor = '#FF4D4D'; }
    ctx.beginPath(); ctx.arc(ex+18, e.y+16+bob, 5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  } else if(theme === 'museum'){
    if(q.glow){ ctx.shadowBlur = 15; ctx.shadowColor = '#D8A24A'; }
    ctx.fillStyle = '#8C4A2E';
    ctx.beginPath(); ctx.arc(ex+18, e.y+18+bob, 17, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(216,162,74,0.9)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ex+18, e.y+18+bob, 22, frame/20, frame/20+2.4); ctx.stroke();
    ctx.fillStyle = '#2A1B0E';
    ctx.beginPath(); ctx.ellipse(ex+12, e.y+16+bob, 3, 5, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex+24, e.y+16+bob, 3, 5, 0.3, 0, Math.PI*2); ctx.fill();
  } else {
    if(q.glow){ ctx.shadowBlur = 15; ctx.shadowColor = '#FF3E9A'; }
    ctx.fillStyle = '#FF3E9A';
    ctx.beginPath(); ctx.ellipse(ex+18, e.y+18+bob, 18, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(ex+11, e.y+14+bob, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex+25, e.y+14+bob, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#12193A';
    ctx.beginPath(); ctx.arc(ex+11, e.y+15+bob, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+25, e.y+15+bob, 2, 0, Math.PI*2); ctx.fill();
  }
}
function drawPredator(p, theme, q){
  const ex = p.x - cameraX;
  if(ex < -40 || ex > 440) return;
  if(q.glow){ ctx.shadowBlur = 14; ctx.shadowColor = '#FF2E2E'; }
  ctx.fillStyle = theme==='museum' ? '#8C8C99' : (theme==='train' ? '#5C4A3A' : '#3A1B4A');
  ctx.beginPath();
  ctx.ellipse(ex, p.y, 15, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ex-15,p.y-2); ctx.lineTo(ex-24,p.y-10); ctx.lineTo(ex-13,p.y-5); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ex+15,p.y-2); ctx.lineTo(ex+24,p.y-10); ctx.lineTo(ex+13,p.y-5); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FF2E2E';
  ctx.beginPath(); ctx.arc(ex-5,p.y-2,2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+5,p.y-2,2.4,0,Math.PI*2); ctx.fill();
}
function drawSpikes(s, theme){
  const sx = s.x - cameraX;
  if(sx < -s.w || sx > 440) return;
  const teeth = Math.max(3, Math.floor(s.w / 18));
  const tw = s.w / teeth;
  ctx.fillStyle = theme==='museum' ? '#8A7350' : (theme==='train' ? '#4A5568' : '#C0392B');
  for(let i=0;i<teeth;i++){
    ctx.beginPath();
    ctx.moveTo(sx+i*tw, s.y+s.h);
    ctx.lineTo(sx+i*tw+tw/2, s.y);
    ctx.lineTo(sx+i*tw+tw, s.y+s.h);
    ctx.closePath(); ctx.fill();
  }
}

function drawHero(q) {
  const skin = CHARACTERS[stats.selectedCharacter] || CHARACTERS[0];
  const mx = hero.x - cameraX;
  const moving = Math.abs(moveX) > 0.12 && !hero.jumping;
  const legSwing = moving ? Math.sin(hero.legAngle) * 9 : 0;
  const idleBob = (!hero.jumping && !moving && !dying) ? Math.sin(frame/18)*2 : 0;

  ctx.save();
  ctx.translate(mx + 17, hero.y + 22 + idleBob);
  ctx.scale((hero.facingRight?1:-1) * (2-hero.squash), hero.squash);
  if(dying){
    ctx.rotate(hero.deathSpin);
    ctx.globalAlpha = Math.max(1 - deathTimer/42, 0.15);
  }
  skin.draw(ctx, { legSwing, moving, jumping:hero.jumping, velY:hero.velY, glow:q.glow, frame });
  ctx.restore();
}

function draw() {
  const theme = LEVELS[currentLevel].theme;
  const q = QUALITY[qualityKey] || QUALITY.smooth;
  ctx.save();
  if(shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

  drawBackground(theme, q);
  drawCastle();
  drawFinishLine();

  const pc = platformColors(theme);
  for(let p of platforms){
    const px = p.x - cameraX;
    if(px > 420 || px + p.w < -20) continue;
    ctx.save();
    ctx.translate(px, p.y);
    ctx.fillStyle = getPlatformGradient(theme, p.h);
    ctx.beginPath(); ctx.roundRect(0, 0, p.w, p.h, 8); ctx.fill();
    ctx.fillStyle = pc.edge;
    ctx.fillRect(0, 0, p.w, 3);
    ctx.restore();
  }

  spikes.forEach(s => drawSpikes(s, theme));

  for(let c of coins){
    if(c.collected) continue;
    const bob = Math.sin(frame/5 + c.x)*6;
    const cx = c.x - cameraX, cy = c.y + bob;
    if(cx < -20 || cx > 420) continue;
    if(q.glow){ ctx.shadowBlur = 22; ctx.shadowColor = '#FFD34D'; }
    ctx.fillStyle = '#FFD34D';
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(frame/25);
    ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(11,0); ctx.lineTo(0,14); ctx.lineTo(-11,0); ctx.closePath(); ctx.fill();
    ctx.restore(); ctx.shadowBlur = 0;
  }

  enemies.forEach(e => {
    if(!e.alive) return;
    const ex = e.x - cameraX;
    if(ex > -40 && ex < 440) drawEnemy(e, theme, q);
  });
  predators.forEach(p => drawPredator(p, theme, q));

  particles.forEach(p => {
    ctx.globalAlpha = Math.max(p.life/24, 0);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  drawHero(q);
  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

/* ============================================================= NAV */
function goToLobby(){
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('pauseModal').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'none';
  gameOverFlag = false; gameWonFlag = false; gameStarted = false; paused = false; dying = false;
  document.getElementById('lobby').style.display = 'flex';
  renderLobby();
}

document.getElementById('restartBtn').addEventListener('click', () => {
  gameStarted = true;
  resetGame();
});
document.getElementById('lobbyBtn1').addEventListener('click', goToLobby);
document.getElementById('lobbyBtn2').addEventListener('click', goToLobby);
document.getElementById('nextBtn').addEventListener('click', () => {
  if(currentLevel + 1 < LEVELS.length){
    currentLevel += 1;
    document.getElementById('levelBadge').textContent = LEVELS[currentLevel].name;
  }
  gameStarted = true;
  resetGame();
});

setupJoystick();
setupJump();
gameLoop();
loadData();
</script>
